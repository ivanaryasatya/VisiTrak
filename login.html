<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VisiTrak</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-industry"></i>
                <h2>VisiTrak</h2>
                <p>Silakan masuk ke akun Anda</p>
            </div>
            
            <!-- Metode Login Alternatif -->
            <div class="social-login">
                <button type="button" class="btn btn-social" onclick="loginWithGoogle()">
                    <i class="fab fa-google" style="color: #ea4335;"></i> Lanjutkan dengan Google
                </button>
                <button class="btn btn-social" onclick="alert('Fitur Login Microsoft/SSO sedang dalam tahap pengembangan API.')">
                    <i class="fab fa-microsoft" style="color: #00a4ef;"></i> Lanjutkan dengan Microsoft
                </button>
            </div>
            
            <div class="login-divider">
                <span>ATAU LOGIN DENGAN EMAIL</span>
            </div>
            
            <!-- Form Login Password -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Email atau Username</label>
                    <input type="text" id="username" placeholder="Masukkan email/username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn-primary-full">Masuk ke Dashboard</button>
            </form>
        </div>
    </div>

    <!-- Logika Autentikasi Sederhana -->
    <script>
        // Konfigurasi Firebase (GANTI DENGAN MILIK ANDA)
        const firebaseConfig = {
            apiKey: "AIzaSyBR4o2yQpnEWglZWaIrF0RMsemwKMe2wtM",
            authDomain: "visitrak-83353.firebaseapp.com",
            databaseURL: "https://visitrak-83353-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "visitrak-83353",
            storageBucket: "visitrak-83353.firebasestorage.app",
            messagingSenderId: "610189188757",
            appId: "1:610189188757:web:665d5f60c04f3bf519c59c",
            measurementId: "G-NM90818W43"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Cek jika sudah login sebelumnya
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // Cek status aturan "auto_approve" di database global
                let autoApprove = false;
                try {
                    const settingsDoc = await db.collection('settings').doc('global').get();
                    if (settingsDoc.exists) {
                        autoApprove = settingsDoc.data().auto_approve === true;
                    }
                } catch (e) {
                    console.warn("Gagal membaca settings global", e);
                }

                // Menyimpan / mengecek data user di Firestore
                const userRef = db.collection('users').doc(user.uid);
                const userDoc = await userRef.get();
                let userData = {};

                if (!userDoc.exists) {
                    userData = {
                        email: user.email,
                        name: user.displayName,
                        role: 'user', 
                        approved: autoApprove 
                    };
                    await userRef.set(userData);
                } else {
                    userData = userDoc.data();
                }

                // Validasi Persetujuan Admin
                if (userData.role === 'admin' || userData.approved) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userRole', userData.role);
                    sessionStorage.setItem('userName', userData.name);
                    sessionStorage.setItem('userEmail', userData.email);
                    window.location.href = 'index.html';
                } else {
                    await auth.signOut();
                    alert('Akun Anda belum disetujui oleh Admin. Silakan hubungi Administrator untuk mendapatkan akses.');
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert('Login Google gagal: ' + error.message);
            }
        }

        async function handleLogin(event) {
            event.preventDefault(); 
            const emailInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            
            // Pintu Belakang Akses Admin Penuh (Fallback Development)
            if (passwordInput === 'ivanganteng') {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', 'admin');
                sessionStorage.setItem('userName', 'Super Admin (Local)');
                sessionStorage.setItem('userEmail', 'admin@visitrak.local');
                window.location.href = 'index.html';
                return;
            }
            
            // Logika login Email/Password Firebase (jika didaftarkan manual)
            try {
                const result = await auth.signInWithEmailAndPassword(emailInput, passwordInput);
                const user = result.user;
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    if (userData.role === 'admin' || userData.approved) {
                        sessionStorage.setItem('isLoggedIn', 'true');
                        sessionStorage.setItem('userRole', userData.role);
                        sessionStorage.setItem('userName', userData.name);
                        sessionStorage.setItem('userEmail', userData.email);
                        window.location.href = 'index.html';
                    } else {
                        await auth.signOut();
                        alert('Akun Anda belum disetujui oleh Admin.');
                    }
                } else {
                    await auth.signOut();
                    alert('Data pengguna tidak ditemukan di database.');
                }
            } catch (error) {
                console.error(error);
                alert('Login gagal! Periksa email dan password Anda, atau akun belum terdaftar di Firebase.');
            }
        }
    </script>
</body>
</html>
